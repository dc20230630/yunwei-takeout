server:
  port: 8080


spring:
  application:
    name: yunwei-server
  datasource:
    url: jdbc:mysql://localhost:3306/yunwei?useUnicode=true&characterEncoding=utf-8&serverTimezone=Asia/Shanghai&useSSL=false
    username: root
    password: 1234
    driver-class-name: com.mysql.cj.jdbc.Driver

mybatis:
  mapper-locations: classpath:mapper/*.xml
  type-aliases-package: com.yunwei.pojo.entity
  configuration:
    map-underscore-to-camel-case: true
    # 开发环境打印 MyBatis 执行的 SQL、参数和执行结果
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl

yunwei:
  jwt:
    secret: eXVud2VpLWp3dC1zZWNyZXQta2V5LXBsZWFzZS1jaGFuZ2UtaW4tcHJvZHVjdGlvbi0yMDI2
    expire-hours: 2

